name: 功能建议
title: "Feature: "
description: 为 nonebot-plugin-kuwo 提出命令、输出模式、配置或维护性改进
labels: ["enhancement"]
assignees: ["006lp"]
body:
  - type: markdown
    attributes:
      value: |
        本项目关注插件业务逻辑、命令解析、消息构建、缓存管理和可维护性。

  - type: checkboxes
    id: checklist
    attributes:
      label: 提交前确认
      options:
        - label: 我已搜索已有 Issue，确认这不是重复建议
          required: true

  - type: dropdown
    id: category
    attributes:
      label: 建议类型
      options:
        - 命令或参数
        - 搜索结果展示
        - 单曲输出模式
        - 音质或直链处理
        - 文件缓存或 .mflac 流程
        - 配置项
        - 文档或示例
        - 测试、CI 或发布流程
        - 其他
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: 需要解决的问题
      description: 描述当前使用中遇到的痛点，而不是直接从实现细节开始
      placeholder: |
        例如：file 模式下缓存占用难以观察，排查发送失败时不清楚是否命中缓存。
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: 建议方案
      description: 描述希望新增或调整的行为，并说明它如何改善现有流程
      placeholder: |
        例如：在 DEBUG 日志中补充缓存命中、文件大小和清理原因。
    validations:
      required: true

  - type: textarea
    id: scope
    attributes:
      label: 影响范围
      description: 说明会影响哪些命令、输出模式、适配器或配置项
      placeholder: |
        命令：kw / kwid
        输出模式：file
        配置项：KUWO_TRACK_CACHE_*
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 已考虑的替代方案
      description: 如果有临时绕过方式、第三方方案或不推荐的做法，可以写在这里

  - type: textarea
    id: examples
    attributes:
      label: 示例
      description: 可提供期望命令、配置、返回文本、日志或 UI 片段
      render: text

  - type: checkboxes
    id: contribution
    attributes:
      label: 贡献意愿
      options:
        - label: 我愿意提交 PR 或协助测试该功能
